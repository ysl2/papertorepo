name: papertorepo

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: papertorepo
      POSTGRES_USER: papertorepo
      POSTGRES_PASSWORD: papertorepo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papertorepo -d papertorepo"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://papertorepo:papertorepo@db:5432/papertorepo
      DATA_DIR: /app/data
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - runtime_data:/app/data

  worker:
    build: .
    command: ["sh", "-lc", "uv run papertorepo migrate && uv run papertorepo worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://papertorepo:papertorepo@db:5432/papertorepo
      DATA_DIR: /app/data
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - runtime_data:/app/data

volumes:
  postgres_data:
  runtime_data:
